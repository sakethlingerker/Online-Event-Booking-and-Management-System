<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EventHub</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="js/auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .modal-content {
            background: var(--white);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .modal-header {
            padding: 24px 32px;
            border-bottom: 1px solid #f1f5f9;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-body,
        form {
            overflow-y: auto;
            padding: 20px 32px;
            flex: 1;
        }

        .stat-card {
            border: 1px solid rgba(0, 0, 0, 0.05);
            background: var(--white);
            color: var(--dark) !important;
        }

        .stat-card .stat-value {
            color: var(--primary);
            font-family: 'Outfit', sans-serif;
        }

        .stat-card .stat-label {
            color: var(--gray);
        }
    </style>

    </style>
</head>

<body>
    <header>
        <div class="container header-content">
            <div class="logo">EventHub</div>
            <ul class="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/events.html">Events</a></li>
                <li><a href="/admin-dashboard.html" class="active">Admin</a></li>
            </ul>
            <div class="auth-buttons" id="authButtons">
                <!-- This will be populated by auth.js -->
            </div>
        </div>
    </header>

    <section class="container">
        <h2 class="section-title">Admin Dashboard</h2>

        <div id="loadingMessage" class="alert alert-info">
            <p><i class="fas fa-spinner fa-spin"></i> Loading admin dashboard...</p>
        </div>

        <div id="dashboardContent" style="display: none;">
            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalEvents">0</div>
                    <div class="stat-label">Total Events</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pendingEvents" style="color: var(--accent);">0</div>
                    <div class="stat-label">Pending Approval</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="approvedEvents" style="color: var(--success);">0</div>
                    <div class="stat-label">Approved Events</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="rejectedEvents" style="color: var(--danger);">0</div>
                    <div class="stat-label">Rejected Events</div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <h3><i class="fas fa-rocket"></i> Quick Actions</h3>
                <div class="action-buttons">
                    <button onclick="loadAdminEvents()" class="btn btn-primary">
                        <i class="fas fa-redo"></i> Refresh Events
                    </button>
                    <button onclick="showPendingEvents()" class="btn btn-secondary">
                        <i class="fas fa-clock"></i> Show Pending Only
                    </button>
                    <button onclick="showAllEvents()" class="btn btn-outline">
                        <i class="fas fa-list"></i> Show All Events
                    </button>
                </div>
            </div>

            <!-- Events Table -->
            <div class="events-section">
                <div class="events-header">
                    <h3><i class="fas fa-tasks"></i> Event Approval Queue</h3>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <span id="filterStatus"
                            style="color: var(--gray); font-size: 0.95rem; font-weight: 500;">Showing all events</span>
                        <button onclick="loadAdminEvents()" class="btn btn-outline">
                            <i class="fas fa-redo"></i> Refresh
                        </button>
                    </div>
                </div>

                <div id="adminEvents">
                    <!-- Events will be loaded here -->
                </div>
            </div>
        </div>
    </section>

    <!-- Approval Modal -->
    <div id="approvalModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-check-circle"></i> Approve Event</h3>
                <button class="close-btn" onclick="hideApprovalModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="approvalMessage"></div>
                <form id="approvalForm">
                    <input type="hidden" id="approvalEventId">
                    <div class="form-group">
                        <label class="form-label">
                            <i class="fas fa-sticky-note"></i> Admin Notes (Optional)
                        </label>
                        <textarea class="form-control" id="adminNotes" rows="4"
                            placeholder="Add any notes or feedback for the organizer..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-danger" onclick="rejectEvent()">
                            <i class="fas fa-times"></i> Reject Event
                        </button>
                        <button type="button" class="btn btn-primary" onclick="approveEvent()">
                            <i class="fas fa-check"></i> Approve Event
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <footer>
        <div class="simple-footer">
            <p>&copy; 2025 EventHub. All rights reserved.</p>
        </div>
    </footer>


    <script>
        let currentUser = null;
        let allEvents = [];

        // Check authentication and admin role
        async function checkAuth() {
            try {
                const response = await fetch('/api/user');
                if (!response.ok) {
                    window.location.href = '/login.html';
                    return;
                }

                const userData = await response.json();
                currentUser = userData.user;

                // Check if user is admin
                if (currentUser.role !== 'admin') {
                    alert('Access denied. Admin privileges required.');
                    window.location.href = '/events.html';
                    return;
                }

                // Note: userWelcome element might be removed if we use centralized auth.js UI
                const userWelcome = document.getElementById('userWelcome');
                if (userWelcome) userWelcome.textContent = currentUser.name;

                loadAdminDashboard();
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = '/login.html';
            }
        }

        // Load admin dashboard
        async function loadAdminDashboard() {
            try {
                await loadAdminEvents();
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'block';
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('loadingMessage').innerHTML = `
                    <div class="alert alert-danger">
                        <h3>Error Loading Dashboard</h3>
                        <p>${error.message}</p>
                        <button onclick="loadAdminDashboard()" class="btn btn-primary">Try Again</button>
                    </div>
                `;
            }
        }

        // Load events for admin approval
        async function loadAdminEvents() {
            try {
                const response = await fetch('/api/admin/events');
                if (!response.ok) throw new Error('Failed to load events');

                allEvents = await response.json();
                displayEvents(allEvents);
                updateStats();

            } catch (error) {
                console.error('Error loading admin events:', error);
                document.getElementById('adminEvents').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i> Error loading events: ${error.message}
                    </div>
                `;
            }
        }

        // Display events in table
        function displayEvents(events) {
            const container = document.getElementById('adminEvents');

            if (events.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar-check"></i>
                        <h4>No Events Found</h4>
                        <p>There are no events to display.</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Event</th>
                                <th>Organizer</th>
                                <th>Date</th>
                                <th>Location</th>
                                <th>Price</th>
                                <th>Seats</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            events.forEach(event => {
                const eventDate = new Date(event.date).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                const statusClass = event.status === 'approved' ? 'status-approved' :
                    event.status === 'rejected' ? 'status-rejected' : 'status-pending';
                const statusIcon = event.status === 'approved' ? 'fa-check' :
                    event.status === 'rejected' ? 'fa-times' : 'fa-clock';

                html += `
                    <tr>
                        <td>
                            <strong style="color: var(--dark); display: block; margin-bottom: 4px;">${event.title}</strong>
                            <small style="color: var(--gray); line-height: 1.4;">${event.description ? event.description.substring(0, 60) + '...' : 'No description available'}</small>
                        </td>
                        <td>
                            <div style="font-weight: 500; color: var(--dark);">${event.organizer_name}</div>
                            <small style="color: var(--gray);">${event.organizer_email}</small>
                        </td>
                        <td style="white-space: nowrap;">${eventDate}</td>
                        <td>${event.location}</td>
                        <td style="font-weight: 600; color: var(--primary);">₹${event.price}</td>
                        <td>
                            <div style="font-weight: 500;">${event.available_seats}/${event.total_seats}</div>
                            <small style="color: var(--gray);">available</small>
                        </td>
                        <td>
                            <span class="status-badge ${statusClass}">
                                <i class="fas ${statusIcon}"></i> ${event.status.toUpperCase()}
                            </span>
                        </td>
                        <td>
                            ${event.status === 'pending' ? `
                                <button onclick="showApprovalModal(${event.id})" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem;">
                                    <i class="fas fa-cog"></i> Review
                                </button>
                            ` : `
                                <span style="color: var(--gray); font-size: 0.85rem; font-style: italic;">Action Completed</span>
                            `}
                            ${event.admin_notes ? `
                                <br><small style="color: var(--gray); margin-top: 4px; display: block;" title="${event.admin_notes}">
                                    <i class="fas fa-sticky-note"></i> Has admin notes
                                </small>
                            ` : ''}
                        </td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;
            container.innerHTML = html;
        }

        // Update stats cards
        function updateStats() {
            const totalEvents = allEvents.length;
            const pendingEvents = allEvents.filter(e => e.status === 'pending').length;
            const approvedEvents = allEvents.filter(e => e.status === 'approved').length;
            const rejectedEvents = allEvents.filter(e => e.status === 'rejected').length;

            document.getElementById('totalEvents').textContent = totalEvents;
            document.getElementById('pendingEvents').textContent = pendingEvents;
            document.getElementById('approvedEvents').textContent = approvedEvents;
            document.getElementById('rejectedEvents').textContent = rejectedEvents;
        }

        // Show only pending events
        function showPendingEvents() {
            const pendingEvents = allEvents.filter(event => event.status === 'pending');
            displayEvents(pendingEvents);
            document.getElementById('filterStatus').textContent = `Showing ${pendingEvents.length} pending events`;
        }

        // Show all events
        function showAllEvents() {
            displayEvents(allEvents);
            document.getElementById('filterStatus').textContent = `Showing all ${allEvents.length} events`;
        }

        // Approval modal functions
        function showApprovalModal(eventId) {
            document.getElementById('approvalEventId').value = eventId;
            document.getElementById('adminNotes').value = '';
            document.getElementById('approvalMessage').innerHTML = '';
            document.getElementById('approvalModal').style.display = 'flex';
        }

        function hideApprovalModal() {
            document.getElementById('approvalModal').style.display = 'none';
        }

        // Approve event
        async function approveEvent() {
            const eventId = document.getElementById('approvalEventId').value;
            const adminNotes = document.getElementById('adminNotes').value;

            if (!eventId) {
                alert('Error: No event ID found');
                return;
            }

            try {
                const response = await fetch(`/api/admin/events/${eventId}/approve`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ admin_notes: adminNotes })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server error: ${response.status} - ${errorText}`);
                }

                const result = await response.json();

                document.getElementById('approvalMessage').innerHTML = `
                    <div class="alert alert-success">
                        <i class="fas fa-check-circle"></i> Event approved successfully!
                    </div>
                `;

                setTimeout(() => {
                    hideApprovalModal();
                    loadAdminEvents();
                }, 1500);
            } catch (error) {
                console.error('Error approving event:', error);
                document.getElementById('approvalMessage').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i> Error: ${error.message}
                    </div>
                `;
            }
        }

        // Reject event
        async function rejectEvent() {
            const eventId = document.getElementById('approvalEventId').value;
            const adminNotes = document.getElementById('adminNotes').value;

            if (!eventId) {
                alert('Error: No event ID found');
                return;
            }

            if (!confirm('Are you sure you want to reject this event? This action cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/events/${eventId}/reject`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ admin_notes: adminNotes })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server error: ${response.status} - ${errorText}`);
                }

                const result = await response.json();

                document.getElementById('approvalMessage').innerHTML = `
                    <div class="alert alert-success">
                        <i class="fas fa-check-circle"></i> Event rejected successfully!
                    </div>
                `;

                setTimeout(() => {
                    hideApprovalModal();
                    loadAdminEvents();
                }, 1500);
            } catch (error) {
                console.error('Error rejecting event:', error);
                document.getElementById('approvalMessage').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i> Error: ${error.message}
                    </div>
                `;
            }
        }


        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>

</html>
