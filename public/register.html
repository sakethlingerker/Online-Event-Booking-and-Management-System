<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EventHub</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <header>
        <div class="container header-content">
            <div class="logo">EventHub</div>
            <ul class="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/events.html">Events</a></li>

                <!-- In header navigation, add this after other menu items -->
                <li><a href="/admin-dashboard.html" id="adminLink" style="display: none;">Admin</a></li>
            </ul>
            <div class="auth-buttons" id="authButtons">
                <a href="/login.html" class="btn btn-outline">Login</a>
                <a href="/register.html" class="btn btn-primary active">Register</a>
            </div>
        </div>
    </header>

    <div class="auth-card">
        <h2 class="form-title" style="border: none; text-align: center; margin-bottom: 32px;">Create Account</h2>
        <div id="messageContainer"></div>
        <form id="registerForm">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" class="form-control" id="name" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email" required
                    placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required minlength="6"
                    placeholder="Min. 6 characters">
            </div>
            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required
                    placeholder="Confirm your password">
            </div>

            <div class="form-group">
                <label class="form-label" for="role">I want to:</label>
                <select class="form-control" id="role" name="role" required>
                    <option value="user">🎫 Attend Events</option>
                    <option value="organizer">🎪 Organize Events</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 14px; font-size: 1rem; margin-top: 16px;">
                Get Started
            </button>
        </form>
        <p style="text-align: center; margin-top: 24px; color: var(--gray); font-size: 0.9375rem;">
            Already have an account? <a href="/login.html"
                style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in</a>
        </p>
    </div>

    <div class="simple-footer">
        <p>&copy; 2025 EventHub. All rights reserved.</p>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            // Check if already logged in
            const alreadyLoggedIn = await checkIfAlreadyLoggedIn(true);

            if (!alreadyLoggedIn) {
                // Setup register form
                document.getElementById('registerForm').addEventListener('submit', async function (e) {
                    e.preventDefault();

                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;

                    if (password !== confirmPassword) {
                        showMessage('Passwords do not match', 'error');
                        return;
                    }

                    const formData = new FormData(this);
                    const data = {
                        name: formData.get('name'),
                        email: formData.get('email'),
                        password: formData.get('password'),
                        role: formData.get('role')
                    };

                    try {
                        const response = await fetch('/api/register', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(data)
                        });

                        const result = await response.json();

                        if (response.ok) {
                            const roleText = data.role === 'organizer' ? 'organizer' : 'user';
                            showMessage(`Registration successful! Your ${roleText} account has been created. Redirecting to login...`, 'success');
                            setTimeout(() => {
                                window.location.href = '/login.html';
                            }, 2000);
                        } else {
                            showMessage(result.error, 'error');
                        }
                    } catch (error) {
                        console.error('Registration error:', error);
                        showMessage('An error occurred during registration', 'error');
                    }
                });
            }
        });
    </script>

    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent),
                radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.05), transparent);
            background-color: var(--light);
        }

        .auth-card {
            max-width: 520px;
            width: 100%;
            margin: 40px auto;
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        select.form-control {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</body>

</html>
