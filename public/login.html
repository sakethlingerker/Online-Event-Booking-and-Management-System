<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EventHub</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent),
                radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.05), transparent);
            background-color: var(--light);
        }

        .auth-card {
            max-width: 480px;
            width: 100%;
            margin: 60px auto;
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .demo-info {
            background: #f8fafc;
            padding: 24px;
            border-radius: var(--radius);
            margin-top: 32px;
            border: 1px solid #e2e8f0;
        }

        .demo-info h4 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--gray);
            margin-bottom: 12px;
        }

        .demo-info p {
            font-size: 0.875rem;
            margin-bottom: 8px;
            color: var(--dark);
        }
    </style>
</head>

<body>
    <header>
        <div class="container header-content">
            <div class="logo">EventHub</div>
            <ul class="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/events.html">Events</a></li>
                <li><a href="/admin-dashboard.html" id="adminLink" style="display: none;">Admin</a></li>
            </ul>
            <div class="auth-buttons" id="authButtons">
                <a href="/login.html" class="btn btn-outline active">Login</a>
                <a href="/register.html" class="btn btn-primary">Register</a>
            </div>
        </div>
    </header>

    <div class="auth-card">
        <h2 class="form-title" style="border: none; text-align: center; margin-bottom: 32px;">Welcome Back</h2>
        <div id="messageContainer"></div>
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com"
                    autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required
                    placeholder="••••••••" autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 14px; font-size: 1rem; margin-top: 8px;">
                Sign In
            </button>
        </form>

        <div class="demo-info">
            <h4>Demo Credentials</h4>
            <p><strong>Admin:</strong> admin@eventhub.com</p>
            <p><strong>Organizer:</strong> organizer@example.com</p>
            <p><strong>Password:</strong> *******</p>
        </div>

        <p style="text-align: center; margin-top: 24px; color: var(--gray); font-size: 0.9375rem;">
            New to EventHub? <a href="/register.html"
                style="color: var(--primary); font-weight: 600; text-decoration: none;">Create an account</a>
        </p>
    </div>

    <div class="simple-footer">
        <p>&copy; 2025 EventHub. All rights reserved.</p>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            // Check if already logged in
            const alreadyLoggedIn = await checkIfAlreadyLoggedIn(true);

            if (alreadyLoggedIn) {
                // Hide the form to prevent confusion while redirecting
                document.getElementById('loginForm').style.display = 'none';
                document.querySelector('.demo-info').style.display = 'none';
            } else {
                // Setup login form
                document.getElementById('loginForm').addEventListener('submit', async function (e) {
                    e.preventDefault();

                    const submitButton = this.querySelector('button[type="submit"]');
                    const originalText = submitButton.innerHTML;

                    submitButton.innerHTML = '<span class="loading"></span> Logging in...';
                    submitButton.disabled = true;

                    const formData = new FormData(this);
                    const data = {
                        email: formData.get('email').trim(),
                        password: formData.get('password')
                    };

                    try {
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(data)
                        });

                        const result = await response.json();

                        if (response.ok) {
                            showMessage('Login successful! Redirecting...', 'success');
                            setTimeout(() => {
                                if (result.user.role === 'admin') {
                                    window.location.href = '/admin-dashboard.html';
                                } else if (result.user.role === 'organizer') {
                                    window.location.href = '/organizer-dashboard.html';
                                } else {
                                    window.location.href = '/events.html';
                                }
                            }, 1500);
                        } else {
                            showMessage(result.error, 'error');
                            submitButton.innerHTML = originalText;
                            submitButton.disabled = false;
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        showMessage('An error occurred during login', 'error');
                        submitButton.innerHTML = originalText;
                        submitButton.disabled = false;
                    }
                });
            }
        });
    </script>
</body>

</html>
